name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          test "$GITHUB_REF_NAME" = "v$version"

      - name: Generate parser
        run: npm run generate

      - name: Check generated parser
        run: git diff --exit-code -- src tree-sitter.json

      - name: Test grammar and Node binding
        run: npm test

      - name: Test packed npm module
        run: npm run test:package

      - name: Pack npm artifact
        run: |
          mkdir -p release
          npm pack --pack-destination release

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: tree-sitter-nomo-package
          path: release/*.tgz
          if-no-files-found: error

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_NPM == 'true'
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download the packaged release artifact
        uses: actions/download-artifact@v8
        with:
          name: tree-sitter-nomo-package
          path: release

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install npm with trusted publishing support
        run: npm install --global npm@11.16.0

      - name: Validate immutable publish source
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          test "$GITHUB_REF_NAME" = "v$version"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$(find release -maxdepth 1 -name '*.tgz' -type f | wc -l | tr -d ' ')" = "1"

      - name: Publish the attested npm artifact with OIDC
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          if [[ "$version" == 0.0.0-* ]]; then
            npm publish release/*.tgz --access public --tag snapshot
          else
            npm publish release/*.tgz --access public
          fi

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Download package
        uses: actions/download-artifact@v8
        with:
          name: tree-sitter-nomo-package
          path: release

      - name: Generate checksum
        working-directory: release
        run: sha256sum *.tgz > SHA256SUMS

      - name: Attest release artifact
        uses: actions/attest@v4
        with:
          subject-path: release/*.tgz

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          prerelease_args=()
          if [[ "$GITHUB_REF_NAME" == v0.0.0-* ]]; then
            prerelease_args+=(--prerelease)
          fi
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" release/* \
              --generate-notes \
              --verify-tag \
              "${prerelease_args[@]}" \
              --title "Tree-sitter Nomo $GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY"
          fi
