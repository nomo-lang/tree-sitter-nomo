name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tree-sitter-nomo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate parser
        run: npm run generate

      - name: Check generated parser is committed
        run: git diff --exit-code -- src tree-sitter.json

      - name: Test grammar and Node binding
        run: npm test

      - name: Test packed npm module
        run: npm run test:package
